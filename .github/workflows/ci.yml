# Enforces the headset-free gate on every push/PR: 90 domain tests,
# typecheck, and a production build. On-headset QA stays in TESTING.md.
name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # matches dev (Node type-stripping test runner)
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build # tsc --noEmit + vite build
